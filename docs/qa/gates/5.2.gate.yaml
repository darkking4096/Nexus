summary: |
  **BLOCKING ISSUES FOUND:**

  1. **TEST INFRASTRUCTURE BROKEN** - Unit tests fail to run due to mock initialization error
     ("Cannot access 'mockPlaywrightInstance' before initialization"). This is a vitest
     temporal dead zone issue in test setup.

  2. **ACCEPTANCE CRITERIA INCOMPLETE** - Image dimension validation (AC-4) is not
     implemented. Carousel validation only checks file existence, not aspect ratio
     (1.91:1 ± 5% or 4:5 ± 5%).

  Story cannot proceed to merge until both issues resolved.

issues:
  - severity: CRITICAL
    category: Test Infrastructure
    description: |
      PublishService.test.ts fails at suite load time with:
      "ReferenceError: Cannot access 'mockPlaywrightInstance' before initialization"

      Root cause: Mock variable `mockPlaywrightInstance` declared at module scope,
      then used in vi.mock() factory function. Vitest hoists vi.mock() calls, causing
      temporal dead zone violation.

      Result: 0 tests collected. Test suite never runs.
    recommendation: |
      Fix mock initialization order. Options:
      1. Use vi.hoisted(() => { ... }) wrapper around mock declarations
      2. Move mockPlaywrightInstance declaration inside vi.mock() factory
      3. Use beforeAll() hook to set up mocks instead of module scope

      Reference: vitest docs on vi.mock() hoisting behavior
    file: "packages/backend/src/services/__tests__/PublishService.test.ts"
    lines: "9-25"

  - severity: CRITICAL
    category: Acceptance Criteria
    description: |
      AC-4: "Validate image dimensions: all slides same aspect ratio (1.91:1 ± 5%
      tolerance or 4:5 ± 5%)" - NOT IMPLEMENTED

      Current code validateImageDimensions(imagePath):
      - Only checks fs.statSync(imagePath).isFile()
      - Does NOT validate aspect ratio
      - Does NOT validate dimensions against 1.91:1 or 4:5 spec
      - References undefined getImageDimensions() function in comments

      Result: Any carousel with wrong aspect ratio passes validation and proceeds
      to Playwright publish attempt (will fail there with poor UX).
    recommendation: |
      1. Implement getImageDimensions(imagePath) utility
         - Use Sharp library to read actual image dimensions
         - Return {width, height}
         - Handle errors gracefully

      2. Update validateImageDimensions(imagePath) to:
         - Call getImageDimensions()
         - Check aspect ratio: Math.abs(width/height - 1.91) < 0.095 OR
                                Math.abs(width/height - 0.8) < 0.04
         - Throw error with specific message if invalid

      3. Add test cases with real image dimensions:
         - Valid: width/height = 1.91 (landscape carousel)
         - Valid: width/height = 0.8 (portrait carousel)
         - Invalid: 2.0:1 (too wide)
         - Invalid: 1.5:1 (out of tolerance)
    file: "packages/backend/src/services/PublishService.ts"
    lines: "295-305"

