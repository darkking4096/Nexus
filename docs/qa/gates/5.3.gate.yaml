issues:
  - severity: CRITICAL
    category: Test Infrastructure
    description: |
      Story 5.3 shares PublishService.test.ts with Story 5.2. Test suite fails at load:
      "ReferenceError: Cannot access 'mockPlaywrightInstance' before initialization"

      This is a vitest mock hoisting bug, not specific to 5.3, but it blocks all
      PublishService tests including Story 5.3 validation tests.

      Result: Cannot test story validation logic.
    recommendation: |
      This is shared infrastructure. Fix must be done in PublishService.test.ts:
      1. Use vi.hoisted() wrapper around mock declarations
      2. Or move mock setup to beforeAll() hook
      3. Or restructure mocks to avoid temporal dead zone

      See Story 5.2 gate for detailed fix recommendations.
    file: "packages/backend/src/services/__tests__/PublishService.test.ts"
    lines: "9-25"

  - severity: CRITICAL
    category: Acceptance Criteria
    description: |
      AC-3: "Validate image dimensions: exactly 1080x1920px (9:16 aspect ratio)"
      - NOT IMPLEMENTED

      Current code validateStoryDimensions(imagePath):
      - Only checks fs.statSync(imagePath).isFile()
      - Does NOT validate actual dimensions
      - Does NOT check 1080x1920 spec or ±2% tolerance
      - References undefined getImageDimensions() function

      Result: Story images can have any dimensions and pass validation. Will fail
      in Playwright or Instagram with poor user experience.
    recommendation: |
      1. Implement getImageDimensions(imagePath) utility
         - Use Sharp library to read actual image metadata
         - Return {width, height}

      2. Create validateStoryDimensions() implementation:
         - Call getImageDimensions()
         - Check aspect ratio ≈ 9:16 (0.5625)
         - Allow ±2% tolerance: Math.abs(ratio - 0.5625) < 0.01125
         - Throw error if outside tolerance

      3. Add test file: PublishService.story.test.ts
         - Test valid: 1080x1920 (exact)
         - Test valid: 1080x1900 (within tolerance)
         - Test invalid: 1000x1800 (too small)
         - Test invalid: 1200x2000 (too large)
         - Test invalid: 720x1280 (wrong aspect ratio)

      Note: This can share getImageDimensions() with Story 5.2 carousel validation.
    file: "packages/backend/src/services/PublishService.ts"
    lines: "223-232"

  - severity: HIGH
    category: Test Coverage
    description: |
      PublishService.story.test.ts file listed in story as "NEW" but not created.
      Story 5.3 validation never tested, even after dimension validation is implemented.
    recommendation: |
