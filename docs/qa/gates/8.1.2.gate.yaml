issues:
  - id: TEST-INTERFACE-001
    severity: CRITICAL
    category: tests
    description: |
      DatabaseAdapter interface mismatch — Mock rejects synchronous .prepare() calls

      Location: packages/backend/tests/helpers/test-db.ts:24
      Error: "Use async query() method instead"

      Pattern mismatch:
        ❌ Tests call: db.prepare('SELECT...').get()  [sync SQLite pattern]
        ✅ DatabaseAdapter expects: await db.query('SELECT...')  [async pattern]

      Affected test files (13 failures):
        - ResearchService.test.ts: 3 failures (lines using .prepare().get())
        - AnalyticsService.test.ts: 5 failures
        - InstaService.test.ts: 5 failures

    recommendation: |
      Option A (Recommended): Migrate all test assertions to async query() interface
        1. Update test files to use: const result = await db.query(sql, params)
        2. Convert .prepare().get() → query()
        3. Convert .prepare().all() → query() with result array

      Option B: Make mock dual-compatible (supports both interfaces)
        1. Add adapter in test-db.ts to accept .prepare() and delegate to async query()
        2. Less invasive but adds mock complexity

      Timeline: 60-90 minutes for Option A (more tests affected than expected)

  - id: LINT-002
    severity: HIGH
    category: code_quality
    count: "29 errors"
    description: |
      ESLint @typescript-eslint/no-explicit-any violations in types/db.ts
      All violations are in DatabaseAdapter type definitions (backward-compat layer)
    recommendation: |
      Option A: Suppress with eslint-disable comments (with justification)
      Option B: Create stricter type definitions (may break backward-compat)

