detailed_issues:
  - id: REG-001
    title: Schema Dependency Verification
    severity: MEDIUM
    category: regression
    description: "BenchmarkService.getStoredCompetitors() assumes profiles table has competitors_json column. Tests fail gracefully in in-memory DB, but production may lack this column."
    recommendation: "Verify migration/schema includes this column. If not, either: (a) add migration, or (b) refactor to not use stored competitors fallback."
    owner: "@dev or @data-engineer"
    blocking: false

  - id: PERF-001
    title: Missing Timeout for Competitor Search
    severity: MEDIUM
    category: performance
    description: "searchService.searchCompetitors() calls external API (EXA) but has no timeout protection. Story 1.7 dev notes identify this risk (Medium probability, Medium impact) but implementation doesn't mitigate."
    recommendation: "Add timeout configuration in next iteration (Story 2.x). Document as tech debt."
    owner: "@architect / @dev"
    blocking: false

  - id: SEC-001
    title: Competitor Handle Input Validation
    severity: MEDIUM
    category: security
    description: "Competitor handles from SearchService are not validated before being mapped to profile_id in convertCompetitorDataToMetrics(). If handles contain XSS payloads, API response may be vulnerable."
    recommendation: "Add whitelist validation: handles must match ^[@a-zA-Z0-9_]+$ before processing."
    owner: "@dev"
    blocking: false

